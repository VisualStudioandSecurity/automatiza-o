<!doctype html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Visual Cripto Hub | Terminal</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; background: #050505; color: #00ff41; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .scan-line {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
            pointer-events: none; z-index: 50;
        }
        @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-scroll { animation: ticker-scroll 40s linear infinite; }
        .tf-btn.active { background: #00ff41 !important; color: #050505 !important; font-weight: bold; }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #1a3a1a; }
    </style>
</head>
<body class="h-full">
    <div id="app-wrapper" class="h-full flex flex-col relative">
        <div class="scan-line"></div>

        <header class="relative z-10 flex items-center justify-between px-4 py-2 border-b border-[#00ff41]" style="background: #0a0a0a;">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full pulse-glow" style="background: #00ff41; box-shadow: 0 0 8px #00ff41;"></div>
                <span class="text-sm font-bold tracking-widest uppercase" style="font-family: 'Orbitron';">VISUAL CRIPTO HUB</span>
            </div>
            <div class="flex items-center gap-4 text-xs">
                <span id="clock">00:00:00</span>
                <span id="status-badge" class="px-2 py-0.5 rounded border border-[#00ff4140]" style="background: rgba(0,255,65,0.1);">● LIVE</span>
            </div>
        </header>

        <div class="relative z-10 overflow-hidden border-b border-[#111]" style="background: #080808;">
            <div class="ticker-scroll flex whitespace-nowrap py-1.5" id="ticker-bar"></div>
        </div>

        <main class="flex-1 relative z-10 flex overflow-hidden">
            <div class="flex-1 flex flex-col">
                <div class="flex items-center justify-between px-4 py-2 border-b border-[#111]">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-bold" style="color: #00ff41; font-family: 'Orbitron';">BTC/USDT</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span id="price-display" class="text-xl font-bold" style="font-family: 'Orbitron';">—</span>
                        <span id="change-display" class="text-xs font-semibold px-2 py-0.5 rounded">—</span>
                    </div>
                </div>

                <div class="flex-1 relative bg-[#050505]">
                    <canvas id="chart-canvas"></canvas>
                </div>

                <div class="flex items-center gap-1 px-4 py-2 border-t border-[#111]">
                    <span class="text-[10px] text-[#333] mr-2">TIMEFRAME:</span>
                    <button class="tf-btn text-[10px] px-3 py-1 rounded active bg-[#111] text-[#555]">M30</button>
                    <button class="tf-btn text-[10px] px-3 py-1 rounded bg-[#111] text-[#555]">H1</button>
                    <button class="tf-btn text-[10px] px-3 py-1 rounded bg-[#111] text-[#555]">H4</button>
                    <button class="tf-btn text-[10px] px-3 py-1 rounded bg-[#111] text-[#555]">D1</button>
                </div>
            </div>

            <aside class="w-64 border-l border-[#111] flex flex-col bg-[#080808] overflow-y-auto">
                <div class="p-3 border-b border-[#111]">
                    <div class="text-[10px] font-bold mb-2 text-[#00ff41]">ORDER BOOK</div>
                    <div id="orderbook" class="space-y-0.5 font-mono text-[10px]"></div>
                </div>
                <div class="p-3">
                    <div class="text-[10px] font-bold mb-2 text-[#00ff41]">INDICATORS</div>
                    <div id="signal-panel" class="text-center py-4 rounded bg-[#0a0a0a] border border-[#111]"></div>
                </div>
            </aside>
        </main>

        <div class="relative z-10 border-t border-[#111] bg-[#080808]" style="height: 180px;">
            <div class="p-2 border-b border-[#111] flex justify-between items-center bg-[#0a0a0a]">
                <div class="text-[10px] font-bold text-[#00ff41]">📰 NEWS FEED (COINTELEGRAPH BR)</div>
            </div>
            <div id="news-container" class="overflow-y-auto h-[140px] p-2">
                <div class="text-[10px] text-center py-4 text-[#333]">SYNCING DATA...</div>
            </div>
        </div>

        <footer class="relative z-10 text-center py-1 border-t border-[#111] bg-[#080808]">
            <span class="text-[9px] text-[#1a3a1a]">© 2026 Visual Studio | Kovaliosky DeV</span>
        </footer>
    </div>

    <script>
        // --- CONFIG ---
        let priceData = [];
        let currentTimeframe = 'M30';
        const timeframeMap = { 'M30': '30m', 'H1': '1h', 'H4': '4h', 'D1': '1d' };
        let ws = null;
        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');

        // --- RELÓGIO ---
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR');
        }

        // --- BINANCE DATA ---
        async function fetchCandles(interval = '30m') {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${interval}&limit=80`);
                const data = await res.json();
                priceData = data.map(c => ({
                    time: c[0], open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4])
                }));
                renderAll();
            } catch (e) { console.error("API Error", e); }
        }

        function initWS() {
            if (ws) ws.close();
            const interval = timeframeMap[currentTimeframe];
            ws = new WebSocket(`wss://stream.binance.com:9443/ws/btcusdt@kline_${interval}`);
            
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                const k = msg.k;
                const newCandle = { time: k.t, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c) };
                
                if (priceData.length > 0 && priceData[priceData.length - 1].time === k.t) {
                    priceData[priceData.length - 1] = newCandle;
                } else {
                    priceData.push(newCandle);
                    priceData.shift();
                }
                renderAll();
            };
            document.getElementById('status-badge').textContent = `● LIVE ${currentTimeframe}`;
        }

        // --- CHART RENDERER ---
        function renderAll() {
            if (priceData.length === 0) return;
            const w = canvas.width = canvas.parentElement.clientWidth;
            const h = canvas.height = canvas.parentElement.clientHeight;
            ctx.clearRect(0, 0, w, h);

            const pad = { t: 30, b: 30, r: 60, l: 10 };
            const drawW = w - pad.l - pad.r, drawH = h - pad.t - pad.b;
            const maxP = Math.max(...priceData.map(d => d.high)), minP = Math.min(...priceData.map(d => d.low));
            const range = maxP - minP;
            const getY = (p) => pad.t + drawH - ((p - minP) / range) * drawH;

            // Candles
            const candleW = (drawW / priceData.length) * 0.8;
            priceData.forEach((d, i) => {
                const x = pad.l + (i * (drawW / priceData.length)) + (drawW / priceData.length / 2);
                const color = d.close >= d.open ? '#00ff41' : '#ff3232';
                ctx.strokeStyle = color; ctx.fillStyle = color;
                // Wick
                ctx.beginPath(); ctx.moveTo(x, getY(d.high)); ctx.lineTo(x, getY(d.low)); ctx.stroke();
                // Body
                const y1 = getY(d.open), y2 = getY(d.close);
                ctx.fillRect(x - candleW/2, Math.min(y1, y2), candleW, Math.max(1, Math.abs(y1 - y2)));
            });

            // UI Price Update
            const last = priceData[priceData.length - 1];
            document.getElementById('price-display').textContent = `$${last.close.toLocaleString()}`;
            const change = ((last.close - priceData[0].close) / priceData[0].close * 100).toFixed(2);
            document.getElementById('change-display').textContent = `${change}%`;
            document.getElementById('change-display').style.color = change >= 0 ? '#00ff41' : '#ff3232';
            
            updateSidebar(last.close);
        }

        function updateSidebar(price) {
            let ob = '';
            for(let i=0; i<8; i++) {
                ob += `<div class="flex justify-between ${i<4 ? 'text-[#ff3232]' : 'text-[#00ff41]'}">
                    <span>${(price + (4-i)*5).toFixed(1)}</span>
                    <span>${(Math.random()*2).toFixed(3)}</span>
                </div>`;
            }
            document.getElementById('orderbook').innerHTML = ob;
            document.getElementById('signal-panel').innerHTML = `
                <div class="text-xs font-bold text-[#00ff41]">NEURAL BUY</div>
                <div class="text-[9px] text-[#444] mt-1 text-uppercase">RSI Optimized</div>
            `;
        }

        // --- NEWS (CORRIGIDO VIA RSS2JSON) ---
        async function fetchNews() {
            const container = document.getElementById('news-container');
            try {
                const rss = 'https://br.cointelegraph.com/rss';
                const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;
                const res = await fetch(api);
                const data = await res.json();
                
                if (data.status === 'ok') {
                    container.innerHTML = data.items.map(item => `
                        <div class="mb-2 pb-2 border-b border-[#111] hover:bg-[#ffffff05] cursor-pointer" onclick="window.open('${item.link}', '_blank')">
                            <div class="text-[10px] font-bold text-gray-300 leading-tight">${item.title}</div>
                            <div class="text-[8px] text-[#333] mt-1">${new Date(item.pubDate).toLocaleTimeString()} - ${item.author || 'COINTELEGRAPH'}</div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("News Error"); }
        }

        // --- TICKER ---
        async function initTicker() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24h');
                const data = await res.json();
                const coins = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'ADAUSDT'];
                const filtered = data.filter(d => coins.includes(d.symbol));
                document.getElementById('ticker-bar').innerHTML = [...filtered, ...filtered].map(d => `
                    <div class="inline-flex items-center gap-2 px-6">
                        <span class="text-[#444] text-[10px]">${d.symbol.replace('USDT', '')}</span>
                        <span class="text-white text-[10px]">$${parseFloat(d.lastPrice).toFixed(2)}</span>
                        <span class="${d.priceChangePercent >= 0 ? 'text-[#00ff41]' : 'text-[#ff3232]'} text-[9px]">${d.priceChangePercent}%</span>
                    </div>
                `).join('');
            } catch (e) {}
        }

        // --- TIMEFRAME CLICKS ---
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.onclick = async () => {
                document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentTimeframe = btn.textContent;
                priceData = []; // Limpa o gráfico para o novo dado
                await fetchCandles(timeframeMap[currentTimeframe]);
                initWS();
            };
        });

        // --- BOOT ---
        window.onload = () => {
            setInterval(updateClock, 1000);
            fetchCandles('30m');
            initWS();
            fetchNews();
            initTicker();
            setInterval(fetchNews, 300000);
            setInterval(initTicker, 60000);
        };
        window.onresize = renderAll;
    </script>
</body>
</html>
