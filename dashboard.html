<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trading Intelligence Hub</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 20px; }
        .chart-container { 
            border: 2px solid #003300; 
            height: 600px; 
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }
        h2 { border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h2>🚀 BITCOIN INTELLIGENCE - 30M FEED</h2>
    
    <div class="chart-container" id="tradingview_chart">
        <div class="tradingview-widget-container">
            <div id="tradingview_btc"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "width": "100%", "height": 600, "symbol": "BINANCE:BTCUSDT",
                    "interval": "30", "timezone": "Etc/UTC", "theme": "dark",
                    "style": "1", "locale": "br", "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false, "hide_top_toolbar": false,
                    "save_image": false, "container_id": "tradingview_btc"
                });
            </script>
        </div>
    </div>

    <script>
        // Lógica de Alerta Visual
        let lastPrice = 0;
        async function monitorVolatility() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await response.json();
                const currentPrice = parseFloat(data.price);
                const container = document.getElementById('tradingview_chart');

                if (lastPrice > 0) {
                    const change = ((currentPrice - lastPrice) / lastPrice) * 100;
                    if (change >= 0.5) { // Subida forte
                        container.style.border = "5px solid #00ff41";
                        container.style.boxShadow = "0 0 20px #00ff41";
                    } else if (change <= -0.5) { // Queda forte
                        container.style.border = "5px solid #ff0000";
                        container.style.boxShadow = "0 0 20px #ff0000";
                    }
                }
                lastPrice = currentPrice;
            } catch (err) { console.error("Erro na API"); }
        }
        setInterval(monitorVolatility, 30000);
    </script>
</body>
</html>
